<!-- Type badge template -->
<ng-template #typeTpl let-row>
  <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
    [class.bg-blue-500/15]="row.type === 'individual'"
    [class.text-blue-400]="row.type === 'individual'"
    [class.bg-purple-500/15]="row.type === 'company'"
    [class.text-purple-400]="row.type === 'company'">
    {{ typeLabel(row.type) }}
  </span>
</ng-template>

<!-- Active badge template -->
<ng-template #activeTpl let-row>
  <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
    [class.bg-green-500/15]="row.isActive"
    [class.text-green-400]="row.isActive"
    [class.bg-muted]="!row.isActive"
    [class.text-muted-foreground]="!row.isActive">
    {{ row.isActive ? 'Activo' : 'Inactivo' }}
  </span>
</ng-template>

<!-- Actions template -->
<ng-template #actionsTpl let-row>
  <div class="flex items-center justify-center gap-3">

    <!-- Editar -->
    <button class="inline-flex items-center gap-1 text-xs text-muted-foreground hover:text-primary transition-colors"
      (click)="onEdit(row)">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Editar
    </button>

    <!-- Ver PDF -->
    <button class="inline-flex items-center gap-1 text-xs text-muted-foreground hover:text-blue-400 transition-colors"
      (click)="onViewPdf(row)">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="15" y2="17"/>
      </svg>
      Ver PDF
    </button>

    <!-- Historial -->
    <button class="inline-flex items-center gap-1 text-xs text-muted-foreground hover:text-foreground transition-colors"
      (click)="onHistory(row)">
      <lib-apolo-icons [icon]="noteIcon" class="flex items-center" />
      Historial
    </button>

    <!-- Activar / Desactivar -->
    <button class="inline-flex items-center gap-1 text-xs transition-colors"
      [class.text-red-400]="row.isActive"
      [class.hover:text-red-300]="row.isActive"
      [class.text-green-400]="!row.isActive"
      [class.hover:text-green-300]="!row.isActive"
      [disabled]="togglingId() === row.id"
      (click)="onToggleActive(row)">
      @if (togglingId() === row.id) {
        <svg class="h-3 w-3 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-opacity="0.3"/>
          <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3"/>
        </svg>
      }
      {{ row.isActive ? 'Desactivar' : 'Activar' }}
    </button>

  </div>
</ng-template>

<div class="border border-border rounded-lg overflow-hidden shadow-sm">

  <!-- Header -->
  <div class="bg-card px-6 py-4 flex items-center justify-between">
    <div>
      <h2 class="text-base font-semibold text-foreground">Plantillas de contratos</h2>
      <p class="text-xs text-muted-foreground mt-0.5">Gestiona las plantillas activas</p>
    </div>
    <ui-button label="Nueva plantilla" variant="default" size="md" [leadingIcon]="starIcon" (click)="onNewTemplate()" />
  </div>

  <!-- Table -->
  <div class="relative">
    @if (loading()) {
      <app-table-skeleton [cols]="6" [rows]="6" />
    } @else if (data().length === 0) {
      <div class="flex flex-col items-center justify-center py-16 text-muted-foreground">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-40">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p class="text-sm">No hay plantillas creadas</p>
        <p class="text-xs mt-1">Crea tu primera plantilla con el botón de arriba</p>
      </div>
    } @else {
      <lib-data-table
        [data]="data()"
        [columns]="columns"
        rowKey="id"
        [borderTop]="false"
        [borderBottom]="false"
        [borderLeft]="false"
        [borderRight]="false"
        [roundedTopLeft]="false"
        [roundedTopRight]="false"
        [roundedBottomLeft]="false"
        [roundedBottomRight]="false"
      />
    }
  </div>

</div>

<!-- Form dialog -->
<app-contract-template-form
  [open]="formOpen()"
  [template]="selectedTemplate()"
  (saved)="onFormSaved()"
  (cancelled)="onFormCancelled()"
/>

<!-- History dialog -->
<app-contract-template-history
  [open]="historyOpen()"
  [code]="selectedCode()"
  (closed)="onHistoryClosed()"
/>

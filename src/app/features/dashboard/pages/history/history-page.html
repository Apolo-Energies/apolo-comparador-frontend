<div class="border border-border rounded-lg overflow-hidden shadow-sm">

  <!-- Cell templates -->
  <ng-template #emailCellTpl let-row>
    <span class="inline-flex items-center gap-1.5">
      <lib-apolo-icons [icon]="emailIconSrc" class="flex items-center shrink-0" />
      <span class="text-muted-foreground">{{ row.user?.email ?? '-' }}</span>
    </span>
  </ng-template>

  <ng-template #dateCellTpl let-row>
    <span class="inline-flex items-center gap-1.5">
      <lib-apolo-icons [icon]="dateIconSrc" class="flex items-center shrink-0" />
      <span>{{ formatDate(row.createdAt) }}</span>
    </span>
  </ng-template>

  <!-- Header -->
  <div class="bg-card px-6 py-5">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
      <ui-input
        label="Usuario"
        placeholder="Buscar por usuario..."
        [value]="filterUser()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterUser.set($event)"
      />
      <ui-input
        label="Email"
        placeholder="Buscar por email..."
        [value]="filterEmail()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterEmail.set($event)"
      />
      <ui-input
        label="Fecha inicio"
        type="date"
        [value]="filterStartDate()"
        (valueChange)="filterStartDate.set($event)"
      />
      <ui-input
        label="Fecha fin"
        type="date"
        [value]="filterEndDate()"
        (valueChange)="filterEndDate.set($event)"
      />
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end mt-4">
      <ui-input
        label="CUPS"
        placeholder="Buscar por CUPS..."
        [value]="filterCups()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterCups.set($event)"
      />
    </div>

    <div class="flex justify-between items-center mt-4">
      <ui-button label="Exportar" variant="secondary" size="md" [leadingIcon]="downloadIcon" (click)="onExport()" />
      <div class="flex gap-2">
        <ui-button label="Limpiar" variant="secondary" size="md" [leadingIcon]="xIcon"      (click)="onClearFilters()" />
        <ui-button label="Filtrar" variant="secondary" size="md" [leadingIcon]="filterIcon" (click)="onSearch()" />
      </div>
    </div>
  </div>

  <!-- Table + overlay loader -->
  <div class="relative">

    @if (loading()) {
      <app-table-skeleton [cols]="5" [rows]="8" />
    } @else if (data().length === 0) {
      <div class="flex flex-col items-center justify-center py-16 text-muted-foreground">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-40"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p class="text-sm">Sin resultados</p>
      </div>
    } @else {
      <lib-data-table
        [data]="data()"
        [columns]="columns"
        rowKey="id"
        [borderTop]="false"
        [borderBottom]="true"
        [borderLeft]="false"
        [borderRight]="false"
        [roundedTopLeft]="false"
        [roundedTopRight]="false"
        [roundedBottomLeft]="false"
        [roundedBottomRight]="false"
      />
    }

  </div>

  <!-- Paginator -->
  <lib-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalCount]="totalCount()"
    [pageSize]="pageSize()"
    [borderTop]="false"
    [borderBottom]="false"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />

</div>

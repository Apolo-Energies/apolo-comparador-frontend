@if (isApolo) {
  <app-brand-loader
    [visible]="loading()"
    [fullscreen]="true"
    [showBar]="true"
    [showWordmark]="false"
    [showTitle]="true"
    title="Cargando....."
    [showDescription]="false"
    [showMicrocopy]="false"
    [showBackdrop]="true"
    [showMicrocopyIcon]="false"
    [size]="100"
  />
} @else {
  <app-loading-overlay [loading]="loading()" />
}

<div class="h-full flex flex-col gap-3">

  <app-comparator-upload
    [showUserSelector]="isMaster()"
    [users]="users()"
    [usersLoading]="usersLoading()"
    [selectedUserId]="selectedUserId()"
    [loading]="loading()"
    (compare)="onCompare($event)"
    (userChange)="selectedUserId.set($event)"
  />

  <!-- Acceso al comparador múltiple -->
  @if (!isComercial()) {
  <a routerLink="/dashboard/comparator-multiple"
    class="shrink-0 flex items-center justify-between gap-3 rounded-lg border border-border bg-card px-5 py-3
           hover:border-primary/60 hover:bg-primary/5 transition-colors group cursor-pointer">
    <div class="flex items-center gap-3">
      <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-muted shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="text-muted-foreground">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-medium text-foreground">Comparativas múltiples</p>
        <p class="text-xs text-muted-foreground">Sube hasta 10 facturas y compáralas a la vez</p>
      </div>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      class="text-muted-foreground group-hover:text-primary transition-colors shrink-0">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </a>
  }

  <app-comparator-modal
    [open]="modalOpen()"
    [ocrResult]="ocrResult()"
    [productsByTariff]="productsByTariff()"
    [feeLockedProducts]="feeLockedProducts"
    [isReferrer]="isReferrer()"
    [comisionBase]="comisionBase()"
    [referrerDefaultFee]="0.3"
    [maxFeeEnergia]="30"
    [maxFeePotencia]="5"
    [result]="result()"
    (openChange)="modalOpen.set($event)"
    (formChange)="onFormChange($event)"
    (download)="onDownload($event)"
  />

</div>

<div class="h-full flex flex-col">
  <lib-comparador
    [showUserSelector]="isMaster()"
    [users]="users()"
    [loading]="loading()"
    (compare)="onCompare($event)"
  />

  <lib-comparador-modal
    [open]="modalOpen()"
    [ocrResult]="ocrResult()"
    [productsByTariff]="productsByTariff"
    [feeLockedProducts]="feeLockedProducts"
    [isReferrer]="isReferrer()"
    [comisionBase]="comisionBase()"
    [result]="result()"
    (openChange)="modalOpen.set($event)"
    (formChange)="onFormChange($event)"
    (download)="onDownload($event)"
  />
</div>

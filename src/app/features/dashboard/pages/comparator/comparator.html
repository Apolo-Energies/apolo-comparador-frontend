@if (isApolo) {
  <app-brand-loader
    [visible]="loading()"
    [fullscreen]="true"
    [showBar]="true"
    [showWordmark]="false"
    [showTitle]="true"
    title="Cargando....."
    [showDescription]="false"
    [showMicrocopy]="false"
    [showBackdrop]="true"
    [showMicrocopyIcon]="false"
    [size]="100"
  />
} @else {
  <app-loading-overlay [loading]="loading()" />
}

<div class="h-full flex flex-col">

  <app-comparador-upload
    [showUserSelector]="isMaster()"
    [users]="users()"
    [selectedUserId]="selectedUserId()"
    [loading]="loading()"
    (compare)="onCompare($event)"
    (userChange)="selectedUserId.set($event)"
  />

  <app-comparador-modal
    [open]="modalOpen()"
    [ocrResult]="ocrResult()"
    [productsByTariff]="productsByTariff"
    [feeLockedProducts]="feeLockedProducts"
    [isReferrer]="isReferrer()"
    [comisionBase]="comisionBase()"
    [referrerDefaultFee]="0.3"
    [maxFeeEnergia]="50"
    [maxFeePotencia]="25"
    [result]="result()"
    (openChange)="modalOpen.set($event)"
    (formChange)="onFormChange($event)"
    (download)="onDownload($event)"
  />

</div>

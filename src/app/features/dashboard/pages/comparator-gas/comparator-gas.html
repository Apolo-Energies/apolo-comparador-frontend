@if (isApolo) {
  <app-brand-loader
    [visible]="loading()"
    [fullscreen]="true"
    [showBar]="true"
    [showWordmark]="false"
    [showTitle]="true"
    title="Procesando factura de gas…"
    [showDescription]="false"
    [showMicrocopy]="false"
    [showBackdrop]="true"
    [showMicrocopyIcon]="false"
    [size]="100"
  />
} @else {
  <app-loading-overlay [loading]="loading()" />
}

<div class="h-full flex flex-col gap-3">

  <app-comparator-upload
    [showUserSelector]="isMaster()"
    [users]="users()"
    [usersLoading]="usersLoading()"
    [selectedUserId]="selectedUserId()"
    [loading]="loading()"
    (compare)="onCompare($event)"
    (userChange)="selectedUserId.set($event)"
  />

  @if (errorMsg(); as err) {
    <div class="rounded-lg border border-destructive bg-destructive/10 p-3 text-sm text-destructive">
      {{ err }}
    </div>
  }

  <app-comparator-gas-modal
    [open]="modalOpen()"
    [ocrResult]="ocrData()"
    [productsByTariff]="productsByTariff()"
    [feeLockedProducts]="feeLockedProducts()"
    [comisionBase]="comisionBase()"
    [maxFeeEnergia]="30"
    [maxFeeFijo]="0.10"
    [result]="result()"
    (openChange)="modalOpen.set($event)"
    (formChange)="onFormChange($event)"
    (download)="onDownload($event)"
  />

</div>

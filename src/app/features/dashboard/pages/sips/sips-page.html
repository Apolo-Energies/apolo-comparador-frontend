<app-brand-loader [visible]="loading()" [showBar]="false" [showPercent]="false" [showTitle]="false" [showWordmark]="false" [description]="null" [microcopy]="null" />

<!-- Search card (solo cuando no hay datos) / Info card (cuando hay datos) -->
@if (!mappedPs()) {
  <div class="mb-6 bg-card rounded-lg border border-border p-6">
    <p class="text-lg font-semibold mb-2">Consultas SIPS</p>
    <div class="flex flex-col md:flex-row md:items-end gap-4">

      <div class="w-full max-w-xl">
        <ui-input
          label="CUPS"
          placeholder="Ingrese CUPS"
          [value]="cups()"
          (valueChange)="cups.set($event)"
        />
        @if (error()) {
          <p class="text-xs text-red-500 mt-1">{{ error() }}</p>
        }
      </div>

      <div class="flex gap-2 mt-4 md:mt-0">
        <ui-button
          [label]="loading() ? 'Consultando...' : 'Consultar'"
          variant="default"
          size="sm"
          [disabled]="!cups().trim() || loading()"
          (click)="onConsultar()"
        />
        <ui-button
          label="Exportar"
          variant="secondary"
          size="sm"
          [leadingIcon]="downloadIcon"
          [disabled]="!hasData()"
          (click)="onExport()"
        />
      </div>

    </div>
  </div>
} @else {
  <app-sips-info-card
    [psData]="mappedPs()!"
    (onExport)="onExport()"
    (onComparativa)="onComparativa()"
    (onClear)="onClear()"
  />
}

<!-- Charts -->
@if (showCharts()) {
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
    <app-sips-donut-chart
      title="Consumo Anual"
      [value]="donutTotal()"
      [data]="donutData()"
      [trend]="trend()"
    />
    <app-sips-power-chart
      title="Potencias contratadas"
      [data]="powerData()"
    />
  </div>

  <div class="mb-6">
    <app-sips-monthly-chart
      title="Consumo Energético Mensual"
      [data]="monthlyRows()"
    />
  </div>
}

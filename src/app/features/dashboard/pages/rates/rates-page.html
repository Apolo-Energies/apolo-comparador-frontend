<!-- Header -->
<div class="mb-6 flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-foreground mb-1">Gestión de Tarifarios</h1>
    <p class="text-sm text-muted-foreground">Administra tarifas, reparto OMIE y potencias BOE</p>
  </div>

  <div class="flex items-center gap-3">
    <ui-button
      label="Exportar Excel"
      variant="secondary"
      size="md"
      [leadingIcon]="downloadIcon"
      [disabled]="loading() || !providerData()"
      (click)="onExportExcel()"
    />
  </div>
</div>

<!-- Tabs -->
<div class="mb-6">
  <div class="grid grid-cols-6 md:grid-cols-5 gap-1 bg-card border border-border rounded-lg p-1">
    <button
      class="col-span-2 md:col-span-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium transition-all rounded-md w-full"
      [class.bg-accent]="activeTab() === 'provider'"
      [class.text-foreground]="activeTab() === 'provider'"
      [class.text-muted-foreground]="activeTab() !== 'provider'"
      (click)="setActiveTab('provider')"
    >
      <lucide-icon [img]="BuildingIcon" [size]="16" />
      <span>Proveedor</span>
    </button>

    <button
      class="col-span-2 md:col-span-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium transition-all rounded-md w-full"
      [class.bg-accent]="activeTab() === 'products'"
      [class.text-foreground]="activeTab() === 'products'"
      [class.text-muted-foreground]="activeTab() !== 'products'"
      (click)="setActiveTab('products')"
    >
      <lucide-icon [img]="CalculatorIcon" [size]="16" />
      <span>Productos</span>
    </button>

    <button
      class="col-span-2 md:col-span-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium transition-all rounded-md w-full"
      [class.bg-accent]="activeTab() === 'tariffs'"
      [class.text-foreground]="activeTab() === 'tariffs'"
      [class.text-muted-foreground]="activeTab() !== 'tariffs'"
      (click)="setActiveTab('tariffs')"
    >
      <lucide-icon [img]="CalculatorIcon" [size]="16" />
      <span>Tarifas</span>
    </button>

    <button
      class="col-span-3 md:col-span-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium transition-all rounded-md w-full"
      [class.bg-accent]="activeTab() === 'omie'"
      [class.text-foreground]="activeTab() === 'omie'"
      [class.text-muted-foreground]="activeTab() !== 'omie'"
      (click)="setActiveTab('omie')"
    >
      <lucide-icon [img]="TrendingUpIcon" [size]="16" />
      <span>Reparto OMIE</span>
    </button>

    <button
      class="col-span-3 md:col-span-1 flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-medium transition-all rounded-md w-full"
      [class.bg-accent]="activeTab() === 'boe'"
      [class.text-foreground]="activeTab() === 'boe'"
      [class.text-muted-foreground]="activeTab() !== 'boe'"
      (click)="setActiveTab('boe')"
    >
      <lucide-icon [img]="ZapIcon" [size]="16" />
      <span>Potencia BOE</span>
    </button>
  </div>
</div>

<!-- Error state -->
@if (error() && !loading()) {
  <div class="rounded-lg border border-destructive bg-destructive/10 p-4">
    <p class="text-sm text-destructive">{{ error() }}</p>
  </div>
}

<!-- Tab content + overlay loader -->
<div class="relative">
  @if (providerData()) {
    <div class="tab-content">
      @switch (activeTab()) {
        @case ('provider') {
          <app-provider-tab [provider]="providerData()!" />
        }
        @case ('products') {
          <app-products-tab [tariffs]="providerData()!.tariffs" />
        }
        @case ('tariffs') {
          <app-tariffs-tab [tariffs]="providerData()!.tariffs" />
        }
        @case ('omie') {
          <app-omie-distribution-tab [tariffs]="providerData()!.tariffs" />
        }
        @case ('boe') {
          <app-boe-power-tab [tariffs]="providerData()!.tariffs" />
        }
      }
    </div>
  }

</div>

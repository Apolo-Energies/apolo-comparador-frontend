<app-loading-overlay [loading]="loading()" />

<ui-alert />

<div class="border border-border rounded-lg overflow-hidden shadow-sm">

  <!-- Header -->
  <div class="bg-card px-6 py-5">
    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
      <ui-input
        label="Nombre"
        placeholder="Buscar por nombre..."
        [value]="filterName()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterName.set($event)"
      />
      <ui-input
        label="Email"
        placeholder="Buscar por email..."
        [value]="filterEmail()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterEmail.set($event)"
      />
      <ui-select
        label="Rol"
        [options]="roleOptions"
        [value]="filterRole()"
        [leadingIcon]="filterIcon"
        (valueChange)="filterRole.set($event)"
      />
      <div class="flex gap-2 justify-end">
        <ui-button label="Limpiar" variant="secondary" size="md" [leadingIcon]="xIcon"        (click)="onClearFilters()" />
        <ui-button label="Buscar"  variant="secondary" size="md" [leadingIcon]="searchIcon"   (click)="onSearch()" />
      </div>
    </div>

    <div class="flex gap-2 justify-between items-center mt-4">
      <ui-button label="Exportar"        variant="secondary" size="md" [leadingIcon]="downloadIcon" (click)="onExport()" />
      <ui-button label="Agregar Usuario" variant="default"   size="md" [leadingIcon]="starIcon" (click)="modalOpen.set(true)" />
    </div>
  </div>

  <!-- Cell templates used by lib-data-table columns -->
  <ng-template #contractStatusTpl let-row>
    <span class="text-sm">{{ contractStatusLabel(row.contractSignatureStatus) }}</span>
  </ng-template>

  <ng-template #actionsTpl let-row>
    <app-user-actions-menu [user]="row" (updated)="load()" />
  </ng-template>

  <!-- Expanded sub-user rows (12 cols: expand + 11 data; colspans keep count correct) -->
  <ng-template #subRowsTpl let-row>
    @for (sub of row.subUsers; track sub.id) {
      <tr class="border-b border-border bg-muted/20 hover:bg-muted/30 transition-colors">
        <!-- expand slot -->
        <td class="px-3 py-2.5"></td>
        <!-- Razón Social -->
        <td class="px-4 py-2.5">
          <div class="flex items-center gap-2">
            <span class="w-0.5 h-4 rounded-full bg-border shrink-0"></span>
            <span class="font-medium text-foreground text-sm">{{ sub.fullName }}</span>
          </div>
        </td>
        <!-- CIF/DNI vacío -->
        <td class="px-4 py-2.5"></td>
        <!-- Email (columna Usuario) -->
        <td class="px-4 py-2.5 text-sm text-muted-foreground">{{ sub.email }}</td>
        <!-- Teléfono vacío -->
        <td class="px-4 py-2.5"></td>
        <!-- Rol -->
        <td class="px-4 py-2.5 text-center text-sm text-muted-foreground">{{ sub.role }}</td>
        <!-- Contrato vacío -->
        <td class="px-4 py-2.5"></td>
        <!-- Expert vacío -->
        <td class="px-4 py-2.5"></td>
        <!-- Comisión -->
        <td class="px-4 py-2.5 text-center text-sm text-muted-foreground">
          {{ sub.commissionPercentage !== null ? (sub.commissionPercentage + '%') : '' }}
        </td>
        <!-- Proveedor vacío -->
        <td class="px-4 py-2.5"></td>
        <!-- Estado Usuario -->
        <td class="px-4 py-2.5 text-center text-sm">
          {{ sub.isActive ? 'Activo' : 'Inactivo' }}
        </td>
        <!-- Actions -->
        <td class="px-4 py-2.5">
          <app-user-actions-menu [user]="toSubUserRow(sub)" (updated)="load()" />
        </td>
      </tr>
    }
  </ng-template>

  <lib-data-table
    [data]="data()"
    [columns]="columns()"
    rowKey="id"
    [expandRowTemplate]="subRowsTpl"
    [isExpandable]="rowIsExpandable"
    [expandBadge]="rowBadge"
    [borderTop]="false"
    [borderBottom]="true"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
  />

  <!-- Paginator -->
  <lib-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalCount]="totalCount()"
    [pageSize]="pageSize()"
    [borderTop]="false"
    [borderBottom]="false"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />

</div>

<app-add-user-modal
  [open]="modalOpen()"
  (saved)="onSaved()"
  (cancelled)="modalOpen.set(false)"
/>

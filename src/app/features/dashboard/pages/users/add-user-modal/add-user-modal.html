<ui-dialog [open]="open()" [closeable]="true" maxWidth="max-w-xl" (openChange)="$event ? null : onCancel()">

  <div class="flex flex-col" style="height: 90vh; max-height: 90vh">

    <!-- Header fijo -->
    <div class="shrink-0 px-6 pt-5 space-y-4">

      <!-- Barra de progreso -->
      <div class="space-y-1">
        <div class="flex justify-between text-sm text-muted-foreground">
          <span>Progreso</span>
          <span>{{ progress() }}%</span>
        </div>
        <div class="w-full bg-muted rounded-full h-1.5">
          <div
            class="bg-primary-button h-1.5 rounded-full transition-all duration-300"
            [style.width.%]="progress()"
          ></div>
        </div>
      </div>

      <!-- Toggle -->
      <div class="flex rounded-lg border border-border p-1 bg-muted gap-1">
        @for (opt of viewOptions; track opt.value) {
          <button
            type="button"
            (click)="setView(opt.value)"
            class="flex-1 text-sm py-1.5 rounded-md transition-all font-medium"
            [class.bg-card]="view() === opt.value"
            [class.text-foreground]="view() === opt.value"
            [class.shadow-sm]="view() === opt.value"
            [class.text-muted-foreground]="view() !== opt.value"
          >
            {{ opt.label }}
          </button>
        }
      </div>

      <!-- Título -->
      <div>
        <p class="text-base font-semibold text-foreground">Datos del usuario</p>
        <p class="text-sm text-muted-foreground">Complete los datos básicos del usuario</p>
      </div>

    </div>

    <!-- Body con scroll -->
    <form class="flex flex-col flex-1 min-h-0">

      <div class="flex-1 overflow-y-auto px-6 py-4">
        @if (view() === 'Individual') {
          <app-form-individual-user [form]="individualForm" [submitted]="submitted()" />
        } @else {
          <app-form-company-user [form]="companyForm" [submitted]="submitted()" />
        }
      </div>

      <!-- Footer fijo -->
      <div class="shrink-0 border-t border-border px-6 py-4 flex items-center justify-between">
        <ui-button label="Cancelar"      variant="outline" size="md" (click)="onCancel()" />
        <ui-button label="Crear Usuario" variant="default" size="md" (click)="onSubmit()" />
      </div>

    </form>

  </div>

</ui-dialog>

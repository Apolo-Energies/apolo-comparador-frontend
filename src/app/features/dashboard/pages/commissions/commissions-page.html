<ui-alert />

<!-- Actions cell template -->
<ng-template #actionsTpl let-row>
  <button
    class="inline-flex items-center gap-1.5 text-xs text-muted-foreground hover:text-foreground transition-colors"
    (click)="onEdit(row)"
  >
    <lib-apolo-icons [icon]="editIcon" class="flex items-center" />
    Editar
  </button>
</ng-template>

<div class="border border-border rounded-lg overflow-hidden shadow-sm">

  <!-- Header -->
  <div class="bg-card px-6 py-4 flex justify-end">
    <ui-button label="Agregar Comisión" variant="default" size="md" [leadingIcon]="starIcon" (click)="modalOpen.set(true)" />
  </div>

  <!-- Table -->
  <div class="relative">
    @if (loading()) {
      <app-table-skeleton [cols]="3" [rows]="8" />
    } @else if (data().length === 0) {
      <div class="flex flex-col items-center justify-center py-16 text-muted-foreground">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-40"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <p class="text-sm">Sin resultados</p>
      </div>
    } @else {
      <lib-data-table
        [data]="data()"
        [columns]="columns"
        rowKey="id"
        [borderTop]="false"
        [borderBottom]="true"
        [borderLeft]="false"
        [borderRight]="false"
        [roundedTopLeft]="false"
        [roundedTopRight]="false"
        [roundedBottomLeft]="false"
        [roundedBottomRight]="false"
      />
    }
  </div>

  <lib-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalCount]="totalCount()"
    [pageSize]="pageSize()"
    [borderTop]="false"
    [borderBottom]="false"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />

</div>

<app-add-commission-modal
  [open]="modalOpen()"
  [editData]="editData()"
  (saved)="onSaved()"
  (cancelled)="onCancelled()"
/>

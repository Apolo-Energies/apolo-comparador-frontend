<div class="bg-card border border-border rounded-xl p-5 h-full flex flex-col">
  <div class="mb-3">
    <h3 class="text-base font-semibold text-foreground">{{ title() }}</h3>
    <p class="text-xs text-muted-foreground">{{ subtitle() }}</p>
  </div>

  @if (loading()) {
    <div class="flex-1 min-h-[260px] flex flex-col gap-2 justify-end pb-4">
      <div class="flex items-end gap-1.5 h-44">
        @for (h of skeletonBars; track $index) {
          <div class="flex-1 rounded-sm bg-muted/40 animate-pulse" [style.height.%]="h"></div>
        }
      </div>
      <div class="flex items-center justify-center gap-2 text-xs text-muted-foreground/70 pt-2">
        <span class="inline-block w-3 h-3 rounded-full border-2 border-muted-foreground/30 border-t-muted-foreground animate-spin"></span>
        <span>Cargando datos…</span>
      </div>
    </div>
  } @else if (hasPoints()) {
    <div class="flex-1 min-h-[260px] relative">
      <canvas #chartCanvas></canvas>
    </div>
    <div class="flex items-center gap-2 text-xs text-muted-foreground pt-3">
      <span class="w-3 h-0.5 rounded" [style.background]="color()"></span>
      <span>{{ legend() }}</span>
    </div>
  } @else {
    <div class="flex-1 min-h-[260px] flex items-center justify-center text-muted-foreground/60 text-sm">
      Sin datos disponibles
    </div>
  }
</div>

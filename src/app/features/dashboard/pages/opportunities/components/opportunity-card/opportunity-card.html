<article
  class="group relative cursor-pointer select-none rounded-xl bg-body hover:bg-body/80 border border-border hover:border-blue-500/40 shadow-md shadow-black/10 hover:shadow-lg hover:shadow-blue-500/10 hover:-translate-y-0.5 transition-all duration-300 ease-out"
  (click)="open.emit(opportunity())"
>
  <div class="px-4 pt-3.5 pb-3 space-y-2.5">
    <!-- Title row -->
    <div class="flex items-start justify-between gap-2">
      <h3
        class="text-[13px] font-semibold tracking-wide text-zinc-100 uppercase leading-snug line-clamp-2 group-hover:text-white transition-colors duration-300"
      >
        {{ titleText() }}
      </h3>
      @if (opportunity().comparisonsCount > 0) {
        <span
          class="shrink-0 inline-flex items-center justify-center min-w-7 rounded-md px-1.5 py-0.5 text-[10px] font-semibold tracking-wide bg-blue-500/10 text-blue-400 ring-1 ring-inset ring-blue-500/20"
          [title]="opportunity().comparisonsCount + ' comparaciones guardadas'"
        >
          {{ opportunity().comparisonsCount }}
        </span>
      }
    </div>

    <!-- Tarifa -->
    <div
      class="text-[12px] font-medium"
      [class]="opportunity().tariff ? 'text-blue-400' : 'text-zinc-500 italic'"
    >
      {{ subtitleText() }}
    </div>

    <!-- CUPS chip + consumo -->
    <div class="flex items-center gap-2  justify-between flex-wrap">
      <span
        class="font-mono text-[10.5px] text-zinc-400 truncate bg-zinc-950/40 ring-1 ring-zinc-800/80 rounded-md px-2 py-0.5"
      >
        {{ opportunity().cups }}
      </span>
      @if (consumptionText()) {
        <span
          class="inline-flex items-center gap-1 text-[10.5px] font-medium text-amber-400/80 bg-amber-500/10 ring-1 ring-amber-500/20 rounded-md px-2 py-0.5"
        >
          <lib-apolo-icons [icon]="flashIcon" class="flex items-center shrink-0" />
          {{ consumptionText() }}
        </span>
      }
    </div>
  </div>

  <!-- Footer -->
  <div
    class="px-4 py-2 border-t border-border flex items-center justify-between text-[11px] text-zinc-400"
  >
    <span class="inline-flex items-center gap-1.5 truncate">
      <lib-apolo-icons [icon]="userIcon" class="flex items-center shrink-0 text-zinc-500" />
      <span class="truncate max-w-35">{{ creatorText() }}</span>
    </span>
    <span class="shrink-0 inline-flex items-center gap-1.5 text-zinc-500">
      <lib-apolo-icons [icon]="dateIcon" class="flex items-center shrink-0" />
      {{ relativeDate() }}
    </span>
  </div>
</article>

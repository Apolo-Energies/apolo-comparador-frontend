<app-loading-overlay [loading]="loading()" />

<!-- Actions cell template -->
<ng-template #actionsTpl let-row>
  <button
    class="inline-flex items-center gap-1.5 text-xs text-primary hover:text-primary/80 transition-colors font-medium"
    (click)="onRowClick(row)"
  >
    Ver detalle
  </button>
</ng-template>

<!-- Dashboard de estadísticas -->
<app-statistics-dashboard
  [summary]="summary()"
  [dailySummary]="dailySummary()"
  [monthlySummary]="monthlySummary()"
  [loading]="loading()"
  (rangeChange)="onDateRangeChange($event)"
  (retryRequest)="onRetry()"
  (exportReport)="onExport()"
/>

<!-- Tabla de usuarios -->
<div class="border border-border rounded-lg overflow-hidden shadow-sm">

  <!-- Header -->
  <div class="flex flex-col bg-card gap-4 p-6">
    <!-- Filtros de búsqueda -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <ui-input
        placeholder="Buscar por nombre..."
        [value]="filterName()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterName.set($event)"
      />
      <ui-input
        placeholder="Buscar por email..."
        [value]="filterEmail()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterEmail.set($event)"
      />
    </div>

    <!-- Filtros de Tarifa/Producto y Acciones -->
    <div class="flex flex-col md:flex-row gap-3 items-end">
      <!-- Selector de Tarifa -->
      <div class="flex-1 w-full">
        <label class="block text-sm font-medium text-foreground mb-2">Tarifa</label>
        <select 
          class="w-full px-4 py-2 bg-background border border-border rounded-md text-foreground focus:outline-none focus:ring-2 focus:ring-primary"
          [value]="selectedTariffId() ?? 'null'"
          (change)="onTariffChange($any($event.target).value)"
        >
          <option value="null">Todas las tarifas</option>
          @for (provider of availableFilters()?.providers ?? []; track provider.id) {
            <optgroup [label]="provider.name">
              @for (tariff of provider.tariffs; track tariff.id) {
                <option [value]="tariff.id">{{ tariff.code }}</option>
              }
            </optgroup>
          }
        </select>
      </div>

      <!-- Selector de Producto (solo visible cuando hay tarifa seleccionada) -->
      @if (selectedTariffId() !== null) {
        <div class="flex-1 w-full">
          <label class="block text-sm font-medium text-foreground mb-2">Producto</label>
          <select 
            class="w-full px-4 py-2 bg-background border border-border rounded-md text-foreground focus:outline-none focus:ring-2 focus:ring-primary"
            [value]="selectedProductId() ?? 'null'"
            (change)="onProductChange($any($event.target).value)"
          >
            <option value="null">Todos los productos</option>
            @for (product of availableProducts(); track product.id) {
              <option [value]="product.id">{{ product.name }}</option>
            }
          </select>
        </div>
      }

      <!-- Acciones -->
      <div class="flex gap-2 flex-shrink-0">
        <ui-button label="Limpiar" variant="secondary" size="md" [leadingIcon]="xIcon"      (click)="onClearFilters()" />
        <ui-button label="Filtrar" variant="secondary" size="md" [leadingIcon]="filterIcon" (click)="onSearch()" />
      </div>
    </div>
  </div>

  <!-- Table -->
  <lib-data-table
    [data]="pagedData()"
    [columns]="columns()"
    rowKey="email"
    [borderTop]="false"
    [borderBottom]="true"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
  />

  <lib-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalCount]="totalCount()"
    [pageSize]="pageSize()"
    [borderTop]="false"
    [borderBottom]="false"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />

</div>

<!-- Templates para headers con ordenamiento -->
<ng-template #cupsHeaderTpl>
  <button 
    type="button"
    (click)="onColumnSort('TotalCups')"
    class="inline-flex items-center gap-1 hover:text-primary transition-colors cursor-pointer"
  >
    <svg 
      *ngIf="!isSortedBy('TotalCups')" 
      class="w-4 h-4 text-muted-foreground" 
      fill="none" 
      stroke="currentColor" 
      viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
    </svg>
    <svg 
      *ngIf="isSortAsc('TotalCups')" 
      class="w-4 h-4 text-primary" 
      fill="none" 
      stroke="currentColor" 
      viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11l5-5m0 0l5 5m-5-5v12" />
    </svg>
    <svg 
      *ngIf="isSortDesc('TotalCups')" 
      class="w-4 h-4 text-primary" 
      fill="none" 
      stroke="currentColor" 
      viewBox="0 0 24 24"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 13l-5 5m0 0l-5-5m5 5V6" />
    </svg>
  </button>
</ng-template>

<!-- Dialog de detalle de usuario -->
<app-user-detail-dialog
  [open]="detailDialogOpen()"
  [userId]="selectedUserId()"
  [userName]="selectedUserName()"
  [dateRange]="dateRange()"
  (closed)="onDetailDialogClose()"
/>

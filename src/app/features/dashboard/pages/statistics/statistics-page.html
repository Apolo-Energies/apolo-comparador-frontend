<app-loading-overlay [loading]="loading()" />

<!-- Dashboard de estadísticas -->
<app-statistics-dashboard />

<!-- Tabla de usuarios -->
<div class="border border-border rounded-lg overflow-hidden shadow-sm">

  <!-- Header -->
  <div class="flex flex-col bg-card md:flex-row md:justify-end md:items-center gap-3 p-6">
    <div class="w-full md:w-auto">
      <ui-input
        placeholder="Buscar por nombre..."
        [value]="filterName()"
        [leadingIcon]="searchIcon"
        (valueChange)="filterName.set($event)"
      />
    </div>
    <div class="grid grid-cols-2 gap-2 md:flex md:flex-row md:gap-3">
      <ui-button label="Exportar" variant="secondary" size="md" [leadingIcon]="downloadIcon" />
      <div class="flex gap-2">
        <ui-button label="Limpiar" variant="secondary" size="md" [leadingIcon]="xIcon"       (click)="onClearFilters()" />
        <ui-button label="Filtrar" variant="secondary" size="md" [leadingIcon]="filterIcon"  (click)="onSearch()" />
      </div>
    </div>
  </div>

  <!-- Table -->
  <lib-data-table
    [data]="data()"
    [columns]="columns"
    rowKey="email"
    [borderTop]="false"
    [borderBottom]="true"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
  />

  <!-- Paginator -->
  <lib-paginator
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [totalCount]="totalCount()"
    [pageSize]="pageSize()"
    [borderTop]="false"
    [borderBottom]="false"
    [borderLeft]="false"
    [borderRight]="false"
    [roundedTopLeft]="false"
    [roundedTopRight]="false"
    [roundedBottomLeft]="false"
    [roundedBottomRight]="false"
    (pageChange)="onPageChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
  />

</div>

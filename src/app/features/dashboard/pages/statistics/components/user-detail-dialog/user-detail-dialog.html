<ui-dialog [open]="open()" [closeable]="true" maxWidth="max-w-4xl" (openChange)="$event ? null : onClose()">
  
  <app-loading-overlay [loading]="loading()" />

  <!-- Header -->
  <div class="px-6 pt-5 pb-4 border-b border-border">
    <h2 class="text-xl font-semibold">Detalle de Comparaciones</h2>
    <p class="text-sm text-muted-foreground mt-1">{{ userName() }}</p>
  </div>

  <!-- Content -->
  <div class="overflow-hidden">
    <lib-data-table
      [data]="data()"
      [columns]="columns()"
      rowKey="id"
      [borderTop]="false"
      [borderBottom]="true"
      [borderLeft]="false"
      [borderRight]="false"
      [roundedTopLeft]="false"
      [roundedTopRight]="false"
      [roundedBottomLeft]="false"
      [roundedBottomRight]="false"
    />

    <lib-paginator
      [currentPage]="currentPage()"
      [totalPages]="totalPages()"
      [totalCount]="totalCount()"
      [pageSize]="pageSize()"
      [borderTop]="false"
      [borderBottom]="false"
      [borderLeft]="false"
      [borderRight]="false"
      [roundedTopLeft]="false"
      [roundedTopRight]="false"
      [roundedBottomLeft]="false"
      [roundedBottomRight]="false"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  </div>

  <!-- Footer -->
  <div class="px-6 py-4 border-t border-border flex justify-end">
    <ui-button 
      label="Cerrar" 
      variant="secondary" 
      size="md" 
      (click)="onClose()"
    />
  </div>

</ui-dialog>
